<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="mars" src="./IMAGES/mars-surface.avif" crossorigin="anonymous">
      </a-assets>
      <a-sphere id="PGB sphere" radius="0.5"
        position="0 2 -5.5" 
        transparent="true"
        blending="additive"
        src="#mars"
        animation="property: rotation; to: 0 360 0; dur: 6000; easing: linear; loop: true">
      </a-sphere>
      <a-box id="PGB Box" 
        position="0 2 -5.5"
        transparent="true"
        blending="additive"
        color="gray">
      </a-box>
    </a-scene>
  </body>
</html>
