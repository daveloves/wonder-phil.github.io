<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      // Sun color change component
      AFRAME.registerComponent('sun-color-cycle', {
        init: function () {
          this.colors = ['#FDB813', '#FF6600', '#FF4500', '#FFD700', '#FF8C00'];
          this.index = 0;
          this.el.setAttribute('material', 'color', this.colors[0]);
        },
        tick: function (time) {
          let index = Math.floor(time / 1500) % this.colors.length;
          if (index !== this.index) {
            this.index = index;
            this.el.setAttribute('material', 'color', this.colors[index]);
          }
        }
      });

      // Orbit component
      AFRAME.registerComponent('orbit', {
        schema: {
          radius: { type: 'number', default: 5 },
          speed:  { type: 'number', default: 1 },
          offset: { type: 'number', default: 0 }
        },
        tick: function (time) {
          let angle = (time * 0.001 * this.data.speed) + this.data.offset;
          let x = Math.cos(angle) * this.data.radius;
          let z = Math.sin(angle) * this.data.radius;
          this.el.setAttribute('position', { x: x, y: 0, z: z });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>

      <!-- Starfield background -->
      <a-sky color="#000005"></a-sky>

      <!-- Lighting - much brighter -->
      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="point" color="#FFF8E7" intensity="3" position="0 0 0" distance="50"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1" position="1 1 1"></a-light>

      <!-- Sun (at center) -->
      <a-sphere id="sun"
        position="0 0 0"
        radius="2"
        material="color: #FDB813; emissive: #FDB813; emissiveIntensity: 0.8"
        sun-color-cycle
        animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true">
      </a-sphere>

      <!-- Mercury -->
      <a-sphere
        radius="0.2"
        material="color: #b5b5b5; emissive: #555; emissiveIntensity: 0.3"
        orbit="radius: 4; speed: 2.0; offset: 0"
        animation="property: rotation; to: 0 360 0; dur: 3000; easing: linear; loop: true">
      </a-sphere>

      <!-- Venus -->
      <a-sphere
        radius="0.35"
        material="color: #e8cda0; emissive: #a08050; emissiveIntensity: 0.3"
        orbit="radius: 6; speed: 1.4; offset: 1"
        animation="property: rotation; to: 0 360 0; dur: 4000; easing: linear; loop: true">
      </a-sphere>

      <!-- Earth -->
      <a-sphere
        radius="0.4"
        material="color: #2E86AB; emissive: #1a4060; emissiveIntensity: 0.3"
        orbit="radius: 8.5; speed: 1.0; offset: 2"
        animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true">
      </a-sphere>

      <!-- Mars -->
      <a-sphere
        radius="0.3"
        material="color: #c1440e; emissive: #7a2b09; emissiveIntensity: 0.3"
        orbit="radius: 11; speed: 0.7; offset: 4"
        animation="property: rotation; to: 0 360 0; dur: 6000; easing: linear; loop: true">
      </a-sphere>

      <!-- Camera with WASD controls -->
      <a-entity position="0 2 20">
        <a-camera wasd-controls look-controls>
          <a-cursor color="white"></a-cursor>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
